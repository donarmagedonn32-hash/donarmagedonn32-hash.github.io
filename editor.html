<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать эскиз — COVRICK</title>
    <link rel="icon" type="image/png" href="logomini.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-color: #ff3366;
            --card-bg: #151515;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        /* ШАПКА */
        header {
            position: fixed; top: 0; width: 100%;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px);
            z-index: 1000; padding: 15px 5%;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo-container { display: flex; align-items: center; gap: 15px; transition: opacity 0.3s; }
        .logo-container:hover { opacity: 0.8; }
        .logo-img { width: 60px; height: 60px; background-color: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-img img { width: 100%; height: 100%; object-fit: cover; }
        .brand-name { font-size: 28px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .back-to-home { color: var(--text-muted); font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .back-to-home:hover { color: var(--accent-color); }

        /* ИНТЕРФЕЙС РЕДАКТОРА */
        .editor-page { padding: 150px 5% 100px; max-width: 1000px; margin: 0 auto; min-height: 80vh; text-align: center; }
        .section-title { font-size: 2.5rem; margin-bottom: 20px; font-weight: 800; }
        .section-subtitle { color: var(--text-muted); margin-bottom: 50px; font-size: 1.1rem; }

        .upload-section, .result-section {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input[type="file"] { margin-bottom: 20px; color: var(--text-muted); }
        .cropper-container { max-width: 100%; height: 400px; margin-bottom: 20px; border-radius: 10px; overflow: hidden; }
        
        .controls { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; align-items: center; }
        .controls label { display: flex; flex-direction: column; font-size: 14px; font-weight: 600; width: 100%; max-width: 400px; color: #ccc; }
        
        .btn {
            display: inline-block; background: var(--accent-color); color: #fff;
            padding: 15px 40px; font-size: 16px; font-weight: 600; border-radius: 50px;
            border: none; cursor: pointer; transition: all 0.3s ease; text-align: center; width: 100%; max-width: 400px; margin-top: 10px;
        }
        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 51, 102, 0.4); }
        .btn:disabled { background: #333; color: #777; cursor: not-allowed; }

        .btn-outline { background: transparent; border: 1px solid var(--text-muted); }
        .btn-outline:hover:not(:disabled) { border-color: var(--text-main); color: var(--text-main); }
        .btn-ai { background: #923978; }
        .btn-ai:hover:not(:disabled) { background: #b04b93; box-shadow: 0 10px 20px rgba(146, 57, 120, 0.4); }

        .ai-tools { margin-top: 25px; padding-top: 25px; border-top: 1px dashed rgba(255,255,255,0.1); width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .ai-tools input { width: 100%; margin-top: 10px; padding: 12px; background: #222; border: 1px solid #444; border-radius: 8px; color: #fff; }
        #aiStatus { font-size: 13px; color: var(--accent-color); margin-top: 15px; display: none; font-weight: 600; }

        #previewCanvas { margin-top: 30px; border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; image-rendering: pixelated; cursor: crosshair; background: #000; max-width: 100%; height: auto; }

        .editor-tools { margin-top: 30px; padding: 25px; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; }
        .editor-tools p { color: var(--text-muted); margin-bottom: 15px; font-size: 0.9rem; }
        
        .palette-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; }
        .color-swatch { width: 35px; height: 35px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s, border 0.2s; }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border: 3px solid #fff; transform: scale(1.15); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        input[type="range"] { accent-color: var(--accent-color); margin-top: 10px; }

        footer { background: #050505; padding: 60px 5% 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .copyright { color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <div class="logo-img"><img src="logo.png" alt="COVRICK Logo"></div>
            <div class="brand-name">covrick</div>
        </a>
        <a href="index.html" class="back-to-home">На главную</a>
    </header>

    <section class="editor-page">
        <h1 class="section-title">Создание эскиза</h1>
        <p class="section-subtitle">Загрузи обложку и посмотри, как она будет выглядеть в формате пиксель-арта.</p>

        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*">
            <div class="cropper-container" style="display: none;">
                <img id="imageToCrop" src="" alt="Picture">
            </div>
            
            <div class="controls" style="display: none;">
                <label>
                    Яркость: <span id="brightnessVal">0</span>
                    <input type="range" id="brightness" min="-100" max="100" value="0">
                </label>
                <label>
                    Контраст: <span id="contrastVal">0</span>
                    <input type="range" id="contrast" min="-100" max="100" value="0">
                </label>
                <button id="processBtn" class="btn">Сгенерировать макет</button>

                <div class="ai-tools">
                    <label style="font-size: 12px; font-weight: normal; color: #888;">
                        API Ключ Gemini (вставь 1 раз, он сохранится):
                        <input type="password" id="geminiApiKey" placeholder="AIzaSy...">
                    </label>
                    <button id="aiEnhanceBtn" class="btn btn-ai">✨ Улучшить детали через ИИ</button>
                    <p id="aiStatus">ИИ анализирует картинку...</p>
                </div>
            </div>
        </div>

        <div class="result-section" style="display: none;">
            <h2 style="font-size: 1.8rem; margin-bottom: 10px;">Твой эскиз 32x32</h2>
            
            <canvas id="previewCanvas" width="512" height="512"></canvas>
            
            <div class="editor-tools">
                <p><strong>Ручной редактор:</strong> выбери цвет из палитры COVRICK и кликни по пикселю для корректировки</p>
                <div id="paletteContainer" class="palette-container"></div>
                <button id="undoBtn" class="btn btn-outline" disabled style="max-width: 300px; padding: 10px 20px;">↩ Шаг назад</button>
            </div>

            <br>
            <button id="downloadPdfBtn" class="btn">Скачать инструкцию PDF</button>
        </div>
    </section>

    <footer>
        <div class="copyright">© 2026 covrick. Все права защищены.  12+</div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const { jsPDF } = window.jspdf;

        // Палитра 35 цветов COVRICK
        const palette = [
            { id: 1, name: "White", hex: "#FFFFFF", r: 255, g: 255, b: 255 },
            { id: 2, name: "Light Bluish Gray", hex: "#A0A5A9", r: 160, g: 165, b: 169 },
            { id: 3, name: "Dark Bluish Gray", hex: "#6C6E68", r: 108, g: 110, b: 104 },
            { id: 4, name: "Black", hex: "#05131D", r: 5, g: 19, b: 29 },
            { id: 5, name: "Dark Red", hex: "#720E0F", r: 114, g: 14, b: 15 },
            { id: 6, name: "Red", hex: "#C91A09", r: 201, g: 26, b: 9 },
            { id: 7, name: "Orange", hex: "#FE8A18", r: 254, g: 138, b: 24 },
            { id: 8, name: "Bright Light Orange", hex: "#F8BB39", r: 248, g: 187, b: 57 },
            { id: 9, name: "Yellow", hex: "#F2CD37", r: 242, g: 205, b: 55 },
            { id: 10, name: "Lime", hex: "#BBE90B", r: 187, g: 233, b: 11 },
            { id: 11, name: "Green", hex: "#237841", r: 35, g: 120, b: 65 },
            { id: 12, name: "Dark Green", hex: "#184632", r: 24, g: 70, b: 50 },
            { id: 13, name: "Sand Green", hex: "#A0BCAC", r: 160, g: 188, b: 172 },
            { id: 14, name: "Dark Blue", hex: "#0A3463", r: 10, g: 52, b: 99 },
            { id: 15, name: "Blue", hex: "#0055BF", r: 0, g: 85, b: 191 },
            { id: 16, name: "Medium Blue", hex: "#5A93DB", r: 90, g: 147, b: 219 },
            { id: 17, name: "Sand Blue", hex: "#6074A1", r: 96, g: 116, b: 161 },
            { id: 18, name: "Dark Azure", hex: "#078BC9", r: 7, g: 139, b: 201 },
            { id: 19, name: "Medium Azure", hex: "#36AEBF", r: 54, g: 174, b: 191 },
            { id: 20, name: "Magenta", hex: "#923978", r: 146, g: 57, b: 120 },
            { id: 21, name: "Dark Pink", hex: "#C870A0", r: 200, g: 112, b: 160 },
            { id: 22, name: "Bright Pink", hex: "#E4ADC8", r: 228, g: 173, b: 200 },
            { id: 23, name: "Pink", hex: "#FC97AC", r: 252, g: 151, b: 172 },
            { id: 24, name: "Tan", hex: "#E4CD9E", r: 228, g: 205, b: 158 },
            { id: 25, name: "Dark Tan", hex: "#958A73", r: 149, g: 138, b: 115 },
            { id: 26, name: "Reddish Brown", hex: "#582A12", r: 88, g: 42, b: 18 },
            { id: 27, name: "Dark Brown", hex: "#352100", r: 53, g: 33, b: 0 },
            { id: 28, name: "Olive Green", hex: "#9B9A5A", r: 155, g: 154, b: 90 },
            { id: 29, name: "Yellowish Green", hex: "#DFEEA5", r: 223, g: 238, b: 165 },
            { id: 30, name: "Dark Purple", hex: "#3F3691", r: 63, g: 54, b: 145 },
            { id: 31, name: "Medium Lavender", hex: "#AC78BA", r: 172, g: 120, b: 186 },
            { id: 32, name: "Lavender", hex: "#E1D5ED", r: 225, g: 213, b: 237 },
            { id: 33, name: "Coral", hex: "#FF698F", r: 255, g: 105, b: 143 },
            { id: 34, name: "Nougat", hex: "#D09168", r: 208, g: 145, b: 104 },
            { id: 35, name: "Medium Nougat", hex: "#CC702A", r: 204, g: 112, b: 42 }
        ];

        // Утилиты конвертации цветов
        function rgbToLab(r, g, b) {
            let r_ = r / 255, g_ = g / 255, b_ = b / 255;
            r_ = r_ > 0.04045 ? Math.pow((r_ + 0.055) / 1.055, 2.4) : r_ / 12.92;
            g_ = g_ > 0.04045 ? Math.pow((g_ + 0.055) / 1.055, 2.4) : g_ / 12.92;
            b_ = b_ > 0.04045 ? Math.pow((b_ + 0.055) / 1.055, 2.4) : b_ / 12.92;
            let x = (r_ * 0.4124 + g_ * 0.3576 + b_ * 0.1805) * 100;
            let y = (r_ * 0.2126 + g_ * 0.7152 + b_ * 0.0722) * 100;
            let z = (r_ * 0.0193 + g_ * 0.1192 + b_ * 0.9505) * 100;
            x = x / 95.047; y = y / 100.000; z = z / 108.883;
            x = x > 0.008856 ? Math.pow(x, 1/3) : (7.787 * x) + (16 / 116);
            y = y > 0.008856 ? Math.pow(y, 1/3) : (7.787 * y) + (16 / 116);
            z = z > 0.008856 ? Math.pow(z, 1/3) : (7.787 * z) + (16 / 116);
            return { l: (116 * y) - 16, a: 500 * (x - y), b: 200 * (y - z) };
        }

        palette.forEach(color => { color.lab = rgbToLab(color.r, color.g, color.b); });

        function getNearestColor(r, g, b) {
            const targetLab = rgbToLab(r, g, b);
            let minDistance = Infinity;
            let nearestColor = palette[0];
            for (let color of palette) {
                let distance = Math.sqrt(
                    Math.pow(targetLab.l - color.lab.l, 2) + 
                    Math.pow(targetLab.a - color.lab.a, 2) + 
                    Math.pow(targetLab.b - color.lab.b, 2)
                );
                if (distance < minDistance) { minDistance = distance; nearestColor = color; }
            }
            return nearestColor;
        }

        // Глобальные переменные
        let cropper;
        let finalPixels = [];
        let historyStack = [];
        let currentEditorColor = palette[0];

        // DOM Элементы
        const imageInput = document.getElementById('imageInput');
        const imageToCrop = document.getElementById('imageToCrop');
        const cropperContainer = document.querySelector('.cropper-container');
        const controls = document.querySelector('.controls');
        const processBtn = document.getElementById('processBtn');
        const resultSection = document.querySelector('.result-section');
        const previewCanvas = document.getElementById('previewCanvas');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        const undoBtn = document.getElementById('undoBtn');
        const paletteContainer = document.getElementById('paletteContainer');
        const brightnessInput = document.getElementById('brightness');
        const contrastInput = document.getElementById('contrast');
        const brightnessVal = document.getElementById('brightnessVal');
        const contrastVal = document.getElementById('contrastVal');
        const aiEnhanceBtn = document.getElementById('aiEnhanceBtn');
        const geminiApiKeyInput = document.getElementById('geminiApiKey');
        const aiStatus = document.getElementById('aiStatus');

        if (localStorage.getItem('geminiKey')) {
            geminiApiKeyInput.value = localStorage.getItem('geminiKey');
        }
        geminiApiKeyInput.addEventListener('input', (e) => {
            localStorage.setItem('geminiKey', e.target.value);
        });

        brightnessInput.addEventListener('input', (e) => brightnessVal.textContent = e.target.value);
        contrastInput.addEventListener('input', (e) => contrastVal.textContent = e.target.value);

        function initPalette() {
            paletteContainer.innerHTML = '';
            palette.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color.hex;
                swatch.title = `${color.id} - ${color.name}`;
                if (color.id === currentEditorColor.id) swatch.classList.add('active');
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
                    swatch.classList.add('active');
                    currentEditorColor = color;
                });
                paletteContainer.appendChild(swatch);
            });
        }
        initPalette();

        imageInput.addEventListener('change', function (e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    imageToCrop.src = event.target.result;
                    cropperContainer.style.display = 'block';
                    controls.style.display = 'flex';
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(imageToCrop, { aspectRatio: 1, viewMode: 1 });
                };
                reader.readAsDataURL(files[0]);
            }
        });

        function saveHistory() {
            historyStack.push([...finalPixels]);
            undoBtn.disabled = false;
            if (historyStack.length > 20) historyStack.shift();
        }

        undoBtn.addEventListener('click', () => {
            if (historyStack.length > 0) {
                finalPixels = historyStack.pop();
                drawPreview();
                if (historyStack.length === 0) undoBtn.disabled = true;
            }
        });

        previewCanvas.addEventListener('click', (e) => {
            if (finalPixels.length === 0) return;
            const rect = previewCanvas.getBoundingClientRect();
            const scale = previewCanvas.width / 32;
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);
            const index = y * 32 + x;
            
            if (finalPixels[index].id !== currentEditorColor.id) {
                saveHistory();
                finalPixels[index] = currentEditorColor;
                drawPreview();
            }
        });

        function applyFilters(r, g, b, brightness, contrast) {
            let factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
            let newR = factor * (r - 128) + 128 + brightness;
            let newG = factor * (g - 128) + 128 + brightness;
            let newB = factor * (b - 128) + 128 + brightness;
            return {
                r: Math.max(0, Math.min(255, newR)),
                g: Math.max(0, Math.min(255, newG)),
                b: Math.max(0, Math.min(255, newB))
            };
        }

        processBtn.addEventListener('click', () => {
            if (!cropper) return;
            const croppedCanvas = cropper.getCroppedCanvas({ width: 32, height: 32, imageSmoothingEnabled: false });
            const ctx = croppedCanvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, 32, 32);
            const data = imageData.data;
            
            const brightness = parseInt(brightnessInput.value);
            const contrast = parseInt(contrastInput.value);

            finalPixels = [];
            historyStack = []; 
            undoBtn.disabled = true;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i+1], b = data[i+2];
                const filtered = applyFilters(r, g, b, brightness, contrast);
                const matchedColor = getNearestColor(filtered.r, filtered.g, filtered.b);
                finalPixels.push(matchedColor);
            }
            drawPreview();
            resultSection.style.display = 'block';
        });

        function drawPreview() {
            const ctx = previewCanvas.getContext('2d');
            const scale = previewCanvas.width / 32; 
            let index = 0;
            for (let y = 0; y < 32; y++) {
                for (let x = 0; x < 32; x++) {
                    ctx.fillStyle = finalPixels[index].hex;
                    ctx.fillRect(x * scale, y * scale, scale, scale);
                    index++;
                }
            }
        }

        aiEnhanceBtn.addEventListener('click', async () => {
            const apiKey = geminiApiKeyInput.value.trim();
            if (!apiKey) { alert("Сначала введите API ключ Gemini!"); return; }
            if (finalPixels.length === 0) { alert("Сначала сгенерируйте макет обычной кнопкой!"); return; }

            saveHistory();
            aiEnhanceBtn.disabled = true;
            aiStatus.textContent = "Создание коллажа для анализа...";
            aiStatus.style.display = 'block';

            try {
                const collageCanvas = document.createElement('canvas');
                collageCanvas.width = 1024; 
                collageCanvas.height = 512;
                const collageCtx = collageCanvas.getContext('2d');

                const originalCanvas = cropper.getCroppedCanvas({ width: 512, height: 512 });
                collageCtx.drawImage(originalCanvas, 0, 0);
                collageCtx.drawImage(previewCanvas, 512, 0, 512, 512);

                const base64Collage = collageCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                const paletteText = palette.map(p => `ID ${p.id}: ${p.name}`).join(', ');
                
                const promptText = `
                Вы — Главный Технолог COVRICK по производству LEGO-мозаик.
                Вам предоставлено изображение-коллаж размером 1024x512.
                - ЛЕВАЯ половина (0-511 X) — это Оригинальное фото в хорошем качестве.
                - ПРАВАЯ половина (512-1023 X) — это Текущий эскиз 32x32, собранный из LEGO-кубиков. Он сгенерирован математически и может быть неточным.

                Ваша задача: Сравнить Оригинал и Текущий эскиз. Найти места, где эскиз потерял узнаваемость, критичные детали или формы. ИСПРАВИТЬ эти места, используя только нашу палитру.

                Палитра ID цветов COVRICK: ${paletteText}. Другие цвета использовать ЗАПРЕЩЕНО.
                Сетка эскиза: 32x32. Координаты X (слева направо) и Y (сверху вниз) от 0 до 31.

                Стратегия анализа и исправления:
                1. Сравнение форм: Посмотрите на главные объекты. Если на эскизе (справа) форма расплылась или имеет "рваные" края, найдите координаты этой формы на оригинале (слева) и восстановите чистый контур на эскизе, используя палитру.
                2. Критичные детали: Найдите на оригинале мелкие, но важные элементы. Если они превратились в одноцветные пятна, зажгите нужные пиксели на эскизе.
                3. Текст и Эмблемы: Не пытайтесь писать буквы. Если текст слился, используйте 1-2 пиксельные линии контрастного цвета.
                4. Работа с цветом: Используйте цвета палитры умно: Highlight-пиксель для блика, Shadow-пиксель для границы.
                5. Минимализм: Изменяйте только то, что критично для узнаваемости. Меньше — лучше на сетке 32x32.

                Верните ТОЛЬКО валидный массив JSON в таком формате:
                [ {"x": 5, "y": 10, "id": 1}, {"x": 28, "y": 2, "id": 9} ]
                Максимум 50 ключевых, хирургически точных исправлений. Никаких пояснений. Строго только JSON массив.`;

                aiStatus.textContent = "ИИ сравнивает оригинал и эскиз...";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [ { text: promptText }, { inline_data: { mime_type: "image/jpeg", data: base64Collage } } ] }],
                        generationConfig: { response_mime_type: "application/json" }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let aiResponseText = data.candidates[0].content.parts[0].text;
                aiResponseText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();
                const corrections = JSON.parse(aiResponseText);

                let appliedCount = 0;
                corrections.forEach(point => {
                    if (point.x >= 0 && point.x < 32 && point.y >= 0 && point.y < 32) {
                        const colorInfo = palette.find(p => p.id === point.id);
                        if (colorInfo) {
                            const globalIndex = point.y * 32 + point.x;
                            finalPixels[globalIndex] = colorInfo;
                            appliedCount++;
                        }
                    }
                });

                drawPreview();
                aiStatus.textContent = `ИИ проанализировал макет и внёс исправлений: ${appliedCount} шт.`;
            } catch (err) {
                console.error(err);
                aiStatus.textContent = "Ошибка ИИ. Проверьте консоль, API ключ или VPN.";
                historyStack.pop(); 
            } finally {
                aiEnhanceBtn.disabled = false;
                setTimeout(() => { aiStatus.style.display = 'none'; aiStatus.textContent = "ИИ анализирует картинку..."; }, 5000);
            }
        });

        downloadPdfBtn.addEventListener('click', () => {
            const doc = new jsPDF('p', 'mm', 'a4');
            
            doc.setTextColor(0, 0, 0); 
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("COVRICK-EDITOR", 105, 20, { align: "center" });
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(16);
            doc.text("Instruction 32x32", 105, 30, { align: "center" });

            const mainSize = 3; 
            const mainStartX = 105 - (32 * mainSize) / 2;
            const mainStartY = 45;
            let index = 0;
            for (let y = 0; y < 32; y++) {
                for (let x = 0; x < 32; x++) {
                    doc.setFillColor(finalPixels[index].hex);
                    doc.rect(mainStartX + (x * mainSize), mainStartY + (y * mainSize), mainSize, mainSize, 'F');
                    index++;
                }
            }

            const schemaY = 155;
            const schemaSize = 20;
            const schemaStartX = 105 - schemaSize;
            doc.setDrawColor(0);
            doc.setLineWidth(0.5);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(0, 0, 0);

            doc.rect(schemaStartX, schemaY, schemaSize, schemaSize, 'S');
            doc.text("1", schemaStartX + schemaSize/2, schemaY + schemaSize/2 + 2, { align: "center" });
            doc.rect(schemaStartX + schemaSize, schemaY, schemaSize, schemaSize, 'S');
            doc.text("3", schemaStartX + schemaSize + schemaSize/2, schemaY + schemaSize/2 + 2, { align: "center" });
            doc.rect(schemaStartX, schemaY + schemaSize, schemaSize, schemaSize, 'S');
            doc.text("2", schemaStartX + schemaSize/2, schemaY + schemaSize + schemaSize/2 + 2, { align: "center" });
            doc.rect(schemaStartX + schemaSize, schemaY + schemaSize, schemaSize, schemaSize, 'S');
            doc.text("4", schemaStartX + schemaSize + schemaSize/2, schemaY + schemaSize + schemaSize/2 + 2, { align: "center" });

            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text("Section Map", 105, schemaY + (schemaSize * 2) + 7, { align: "center" });

            const sectors = [
                { name: "Section 1", offsetX: 0, offsetY: 0 },
                { name: "Section 2", offsetX: 0, offsetY: 16 },
                { name: "Section 3", offsetX: 16, offsetY: 0 },
                { name: "Section 4", offsetX: 16, offsetY: 16 }
            ];

            sectors.forEach((sector) => {
                doc.addPage();
                doc.setTextColor(0, 0, 0); 
                doc.setFont("helvetica", "bold");
                doc.setFontSize(20);
                doc.text("COVRICK-EDITOR", 105, 15, { align: "center" });
                
                doc.setFontSize(18);
                doc.text(sector.name, 105, 25, { align: "center" });

                let partsCount = {};
                let sectorPixels = [];
                for (let y = 0; y < 16; y++) {
                    let row = [];
                    for (let x = 0; x < 16; x++) {
                        let globalX = sector.offsetX + x;
                        let globalY = sector.offsetY + y;
                        let color = finalPixels[globalY * 32 + globalX];
                        row.push(color);
                        partsCount[color.id] = (partsCount[color.id] || 0) + 1;
                    }
                    sectorPixels.push(row);
                }

                doc.setFontSize(11);
                doc.setFont("helvetica", "bold");
                doc.text("Parts List:", 15, 40);
                
                doc.setFont("helvetica", "normal");
                doc.setFontSize(9);
                let specY = 48;
                const squareSize = 3.5;

                const sortedIds = Object.keys(partsCount).sort((a, b) => Number(a) - Number(b));
                sortedIds.forEach(id => {
                    const colorInfo = palette.find(p => p.id == id);
                    doc.setFillColor(colorInfo.hex);
                    doc.rect(15, specY - 3, squareSize, squareSize, 'F');
                    doc.setDrawColor(200, 200, 200);
                    doc.rect(15, specY - 3, squareSize, squareSize, 'S');
                    
                    doc.setTextColor(0, 0, 0); 
                    doc.text(`${id}. ${colorInfo.name} - ${partsCount[id]} pcs`, 20, specY);
                    specY += 5;
                });

                const gridStartX = 88;
                const gridStartY = 40;
                const cellSize = 6.8; 
                doc.setFontSize(8); 
                for (let y = 0; y < 16; y++) {
                    for (let x = 0; x < 16; x++) {
                        let color = sectorPixels[y][x];
                        doc.setFillColor(color.hex);
                        doc.rect(gridStartX + (x * cellSize), gridStartY + (y * cellSize), cellSize, cellSize, 'F');
                        doc.setDrawColor(180, 180, 180);
                        doc.rect(gridStartX + (x * cellSize), gridStartY + (y * cellSize), cellSize, cellSize, 'S');

                        let brightness = (color.r * 299 + color.g * 587 + color.b * 114) / 1000;
                        doc.setTextColor(brightness > 125 ? 0 : 255);
                        doc.text(color.id.toString(), gridStartX + (x * cellSize) + (cellSize / 2), gridStartY + (y * cellSize) + (cellSize / 2) + 1, { align: "center", baseline: "middle" });
                    }
                }
            });

            doc.save("COVRICK-Instruction.pdf");
        });
    </script>
</body>
</html>
